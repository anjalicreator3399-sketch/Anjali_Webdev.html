<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    *{
    margin: 0;
    padding: 0;
    }
    .owner{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    background-color:aqua;
    width: 100%;
    }
    .boss{
    list-style-type: none;
    display: flex; 
    width: 100%;
    }
    .boss li a{
    text-decoration: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    }
    .logo{
    width: 50px;
    height: 30px;
    margin: 2px;
    box-sizing: border-box;
    }

    .logo img{
        width: 100%;
        height: 100%;
        border: 1px solid black;
    }
</style>
    <title>Task 6 - nav bar with flexbix</title>
</head>
<body>
    <Nav class="owner">

        <Div class="logo"><img src="Anjalicreator.jpg" alt="logo">Anjali creator</Div>

        <ul class="boss">

            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </Nav>
</body>
</html>
